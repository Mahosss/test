<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eve</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* جزيئات الخلفية المتطايرة (فراشات وورود تتحرك لأسفل) */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
        }
        .particle {
            position: absolute; font-size: 20px; color: rgba(255, 255, 255, 0.7);
            animation: floatDown linear infinite; opacity: 0;
        }
        @keyframes floatDown {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        .particle:nth-child(1) { left: 10%; font-size: 24px; animation-duration: 15s; animation-delay: 0s; content: "🦋"; }
        .particle:nth-child(2) { left: 30%; font-size: 18px; animation-duration: 20s; animation-delay: 3s; content: "🌹"; }
        .particle:nth-child(3) { left: 50%; font-size: 28px; animation-duration: 18s; animation-delay: 5s; content: "🦋"; }
        .particle:nth-child(4) { left: 70%; font-size: 22px; animation-duration: 25s; animation-delay: 1s; content: "🌹"; }
        .particle:nth-child(5) { left: 85%; font-size: 20px; animation-duration: 17s; animation-delay: 4s; content: "🦋"; }

        .laila-card {
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            z-index: 2;
            position: relative;
        }

        .header-section { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        /* برواز الصورة مع توهج خارجي قوي متحرك (Outer Glow) */
        .avatar-box { 
            width: 320px; height: 100px; border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid #7000ff;
            position: relative;
            /* أنيميشن التوهج الخارجي */
            animation: outerGlowPulse 2s infinite alternate ease-in-out;
        }

        @keyframes outerGlowPulse {
            0% { 
                box-shadow: 0 0 15px rgba(112, 0, 255, 0.6), 0 0 30px rgba(112, 0, 255, 0.4); 
                border-color: #7000ff; 
            }
            100% { 
                box-shadow: 0 0 25px rgba(180, 100, 255, 0.9), 0 0 50px rgba(180, 100, 255, 0.6), 0 0 70px rgba(180, 100, 255, 0.3); 
                border-color: #b464ff; 
            }
        }

        /* منع نسخ وسحب الصورة بالـ CSS */
        .avatar-box img { 
            width: 100%; height: 100%; object-fit: cover; 
            user-select: none; 
            -webkit-user-drag: none; 
            pointer-events: none; 
        }
        
        /* لمعة قوية وسريعة على الاسم */
        .name-box h1 { 
            font-size: 1.8rem; 
            color: transparent;
            background: linear-gradient(110deg, #ffffff 0%, #ffffff 35%, #a0a0ff 50%, #ffffff 65%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: superShine 1.5s linear infinite;
        }

        @keyframes superShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .name-box p { color: #a0a0ff; font-size: 0.9rem; line-height: 1.5; }

        .player-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 25px; }
        .track-info { margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; font-size: 1.4rem; }
        .play-btn { 
            width: 50px; height: 50px; background: #7000ff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.3s;
        }
        .play-btn:hover { background: #9d4edd; transform: scale(1.1); }

        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 10px; margin: 20px 0; cursor: pointer; }
        .progress-bar { width: 0%; height: 100%; background: #7000ff; border-radius: 10px; transition: width 0.1s linear; }

        .playlist { margin-top: 20px; }
        .song-item { 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; cursor: pointer; transition: 0.3s;
        }
        .song-item:hover, .active-song { color: #b464ff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- الجزيئات المتطايرة (تتحرك لأسفل) -->
    <div class="particles">
        <div class="particle">🦋</div>
        <div class="particle">🌹</div>
        <div class="particle">🦋</div>
        <div class="particle">🌹</div>
        <div class="particle">🦋</div>
    </div>

    <div class="laila-card">
        <div class="header-section">
            <div class="avatar-box">
                <img src="https://xatimg.com/image/YqjKEtyM2jfU.jpg" alt="Eve" oncontextmenu="return false;" draggable="false">
            </div>
            <div class="name-box">
                <h1>Eve</h1>
                <p>أنتِ لستِ مجرد شخص عابر في الحياه، أنتِ التفاصيل اللطيفة التي تجعل هذا العالم يبدو أجمل. لا شيء يشبه هدوء روحكِ وجمال ضحكتكِ.. دمتِ شيئاً جميلاً لا ينتهي. </p>
            </div>
        </div>

        <div class="player-box">
            <div class="track-info" id="trackTitle">اختر أغنية للبدء</div>
            <div class="progress-container" id="progCont"><div class="progress-bar" id="progBar"></div></div>
            <div class="controls">
                <i class="fas fa-backward" id="prev"></i>
                <div class="play-btn" id="play"><i class="fas fa-play" id="icon"></i></div>
                <i class="fas fa-forward" id="next"></i>
            </div>
        </div>

        <div class="playlist" id="list"></div>
    </div>

    <audio id="audio"></audio>

    <script>
        const songs = [
            { title: "ليالي هادئة", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { title: "سكون النجوم", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
        ];
        
        let current = 0;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const icon = document.getElementById('icon');
        const title = document.getElementById('trackTitle');
        const progBar = document.getElementById('progBar');
        const playlist = document.getElementById('list');
        const progCont = document.getElementById('progCont');

        function loadSong(idx) {
            audio.src = songs[idx].src;
            title.innerText = songs[idx].title;
            
            playlist.innerHTML = '';
            songs.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = `song-item ${i === idx ? 'active-song' : ''}`;
                item.innerText = song.title;
                item.onclick = () => {
                    current = i;
                    loadSong(current);
                    audio.play();
                    icon.className = "fas fa-pause";
                };
                playlist.appendChild(item);
            });
        }

        playBtn.addEventListener('click', () => {
            if(audio.paused) { audio.play(); icon.className = "fas fa-pause"; }
            else { audio.pause(); icon.className = "fas fa-play"; }
        });

        audio.addEventListener('timeupdate', () => {
            const p = (audio.currentTime / audio.duration) * 100;
            progBar.style.width = (p || 0) + "%";
        });

        progCont.addEventListener('click', (e) => {
            const width = progCont.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        document.getElementById('prev').onclick = () => {
            current = (current - 1 + songs.length) % songs.length;
            loadSong(current);
            audio.play();
            icon.className = "fas fa-pause";
        }

        document.getElementById('next').onclick = () => {
            current = (current + 1) % songs.length;
            loadSong(current);
            audio.play();
            icon.className = "fas fa-pause";
        }

        loadSong(0);
    </script>
</body>
</html>
