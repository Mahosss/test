<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eve</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        /* كارت ليلى: داكن ومستطيل مع حواف حادة قليلاً ليعطي طابعاً مختلفاً */
        .laila-card {
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
        }

        .header-section { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar-box { 
            width: 330px; height: 100px; border-radius: 20px; 
            overflow: hidden; border: 2px solid #7000ff;
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.5);
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .name-box h1 { font-size: 1.8rem; color: #fff; }
        .name-box p { color: #a0a0ff; font-size: 0.9rem; }

        /* مشغل الصوت بنمط داكن */
        .player-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 25px; }
        .track-info { margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; font-size: 1.4rem; }
        .play-btn { 
            width: 50px; height: 50px; background: #7000ff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.3s;
        }
        .play-btn:hover { background: #9d4edd; transform: scale(1.1); }

        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 10px; margin: 20px 0; cursor: pointer; }
        .progress-bar { width: 0%; height: 100%; background: #7000ff; border-radius: 10px; }

        /* القائمة: شكل مختلف (قائمة داكنة بحدود خفيفة) */
        .playlist { margin-top: 20px; }
        .song-item { 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; cursor: pointer;
        }
        .song-item:hover { color: #7000ff; }
    </style>
</head>
<body>

    <div class="laila-card">
        <div class="header-section">
            <div class="avatar-box"><img src="https://xatimg.com/image/YqjKEtyM2jfU.jpg"></div>
            <div class="name-box">
                <h1>Eve</h1>
                <p>أنتِ لستِ مجرد شخص عابر في الحياه، أنتِ التفاصيل اللطيفة التي تجعل هذا العالم يبدو أجمل. لا يشئ يشبه هدوء روحكِ وجمال ضحكتكِ.. دمتِ شيئاً جميلاً لا ينتهي. </p>
            </div>
        </div>

        <div class="player-box">
            <div class="track-info" id="trackTitle">اختر أغنية للبدء</div>
            <div class="progress-container" id="progCont"><div class="progress-bar" id="progBar"></div></div>
            <div class="controls">
                <i class="fas fa-backward" id="prev"></i>
                <div class="play-btn" id="play"><i class="fas fa-play" id="icon"></i></div>
                <i class="fas fa-forward" id="next"></i>
            </div>
        </div>

        <div class="playlist" id="list">
            <!-- سيتم إضافة الأغاني هنا برمجياً -->
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const songs = [
            { title: "ليالي هادئة", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { title: "سكون النجوم", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
        ];
        
        let current = 0;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const icon = document.getElementById('icon');
        const title = document.getElementById('trackTitle');
        const progBar = document.getElementById('progBar');

        function loadSong(idx) {
            audio.src = songs[idx].src;
            title.innerText = songs[idx].title;
        }

        playBtn.addEventListener('click', () => {
            if(audio.paused) { audio.play(); icon.className = "fas fa-pause"; }
            else { audio.pause(); icon.className = "fas fa-play"; }
        });

        audio.addEventListener('timeupdate', () => {
            const p = (audio.currentTime / audio.duration) * 100;
            progBar.style.width = p + "%";
        });

        // تشغيل أول أغنية تلقائياً عند التحميل
        loadSong(0);
    </script>
</body>
</html>
